# yaml-language-server: $schema=./compass/project.schema.json
# Project configuration — fill in your values, or run /setup.
# Schema: .claude/compass/project.schema.json (editor autocomplete + /setup validation).

# — Identity —
name: ""                # e.g. my-project
repo: ""                # GitHub slug, e.g. owner/my-project
base_branch: main       # Branch PRs are opened against

# — Commands — (left blank? /setup fills these from package.json scripts)
package_manager: npm    # npm | pnpm | yarn | bun
install_cmd: ""         # Optional — custom install for any stack, e.g. uv sync. Blank = use package_manager
dev_cmd: npm run dev    # Start dev server
dev_port: 3000          # Dev server port
test_cmd: npm test
lint_cmd: npm run lint
format_cmd: npm run format
type_check_cmd: ""      # Optional, e.g. npm run typecheck — leave blank if not used
src_dir: src/           # Source directory

# — Worktrees —
worktree_prefix: ""     # e.g. ../my-project- — worktrees are placed as siblings of the main
                        # project dir (../), not inside it — avoids IDE confusion and nested git issues
db_file: ""             # Optional: e.g. myapp.db — copied per worktree (file/SQLite DBs only)

# Per-worktree isolation hooks (optional) — run in the new worktree with
# WT_NAME, WT_DIR, WT_BRANCH, WT_PORT exported. Use for server DBs that can't be
# file-copied (Postgres/MySQL/…). Point at a script for anything non-trivial.
# Example (Postgres):
#   worktree_setup_cmd: createdb "myapp_$WT_NAME"
#   worktree_teardown_cmd: dropdb --if-exists "myapp_$WT_NAME"
worktree_setup_cmd: ""     # runs after install (create DB/schema, write per-worktree env)
worktree_teardown_cmd: ""  # runs before removal (drop the per-worktree DB/schema)

# — CI / autonomy — only used if the CI workflow (.github/workflows/pr-validation.yml)
# is installed. See .claude/compass/reference/AUTONOMY.md.
autonomy_mode: off          # off | review-only | full
ci_review_provider: claude  # claude | openai | gemini — which LLM runs the CI review.
                            # Secret per provider (gh secret set): ANTHROPIC_API_KEY /
                            # OPENAI_API_KEY / GEMINI_API_KEY. See AUTONOMY.md.
